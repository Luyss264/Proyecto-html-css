<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pets</title>
    <link rel="stylesheet" href="../styles/pets.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header-container">
        <h1 id="pets-title" class="pets-title">My Pets</h1>
        <nav class="nav-panel">
            <ul>
                <li><button id="names-button" class="btn">Know my pet's names</button></li>
                <li><a class="btn" href="./index.html">Back</a></li>
            </ul>
        </nav>
    </header>

    <main class="pets-main-content">
        <section class="pets-gallery-grid">
            <figure class="pet-card">
                <img class="pet-image" src="../mascotas-images/img-galeria-3-icotea-colombiana.webp" alt="My turtle Amanda">
                <figcaption class="pet-description">Meet my turtle, her name is Amanda, she is 9 years old</figcaption>
            </figure>

            <figure class="pet-card">
                <img class="pet-image" src="../mascotas-images/perro-pug-aislado-sobre-fondo-blanco_2829-11416.avif" alt="My dog Augusta">
                <figcaption class="pet-description">This is my dog Augusta, she is 10 years old</figcaption>
            </figure>

            <figure class="pet-card">
                <img class="pet-image" src="../mascotas-images/Cat_November_2010-1a.jpg.webp" alt="My cat Doroteo">
                <figcaption class="pet-description">This is my cat, his name is Doroteo, he is around 1 year old</figcaption>
            </figure>

            <figure class="pet-card">
                <img class="pet-image" src="../mascotas-images/Humpback_whale_(Megaptera_novaeangliae)_calf_Moorea_2.jpg" alt="My whale Marta">
                <figcaption class="pet-description">This is my whale, her name is Marta, she is 18 years old</figcaption>
            </figure>

            <figure class="pet-card">
                <img class="pet-image" src="../mascotas-images/mytiger.jpeg" alt="My tiger Mishu">
                <figcaption class="pet-description">This is my tiger, his name is Mishu, he is 6 years old</figcaption>
            </figure>

            <figure class="pet-card">
                <img class="pet-image" src="../mascotas-images/green-iguana.jpg" alt="My iguana Joaquin">
                <figcaption class="pet-description">This is my male iguana, his name is Joaquin, he is 3 years old</figcaption>
            </figure>
        </section>
    </main>
    <script src="../pets.js"></script>
</body>
</html>
